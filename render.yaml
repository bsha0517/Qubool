services:
  - type: web
    name: qubool-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Supabase connection string here (see DEPLOYMENT.md)
      - key: REDIS_URL
        sync: false # paste your Upstash connection string here (see DEPLOYMENT.md)
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false # set this to your Vercel frontend URL after it's deployed
    # After the service is created, add the remaining vars from
    # backend/.env.example (Twilio, AWS, KYC provider, etc.) in the Render
    # dashboard — they're intentionally left out here since they're optional
    # dev-fallback-friendly credentials, not required to boot the service.
    #
    # NOTE: Render's own free Postgres/Redis add-ons (commented out below)
    # work too, but Render's free Postgres auto-deletes after 90 days.
    # Supabase (Postgres) + Upstash (Redis) are free with no expiry and no
    # credit card, so DATABASE_URL/REDIS_URL above point there instead.
    # If you'd rather use Render's own databases, uncomment the two blocks
    # below and switch the two envVars above to fromDatabase/fromService.

# databases:
#   - name: qubool-postgres
#     plan: free

